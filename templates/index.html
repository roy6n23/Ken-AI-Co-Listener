<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ken — Welcome</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f4ece0;
    --bg-card: #fffdf8;
    --ink: #1f1812;
    --ink-2: #524539;
    --ink-3: #93836f;
    --ink-4: #c3b5a0;
    --line: #ebe0cc;
    --line-2: #f0e7d7;
    --accent: #3a4a32;
    --accent-soft: #ebe7d8;
    --hot: #c64a3a;
    --shadow-card: 0 1px 0 rgba(26,24,20,0.04), 0 18px 40px -22px rgba(26,24,20,0.18), 0 6px 14px -8px rgba(26,24,20,0.08);
    --radius: 22px;
    --ease: cubic-bezier(.2,.8,.2,1);

    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --font-serif: 'Instrument Serif', 'Times New Roman', serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    overflow-x: hidden;
    font-feature-settings: "ss01", "cv11";
  }

  /* Subtle paper grain */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background-image: radial-gradient(rgba(26,24,20,0.025) 1px, transparent 1px);
    background-size: 3px 3px;
    z-index: 0;
    mix-blend-mode: multiply;
  }

  .topbar {
    position: relative; z-index: 5;
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 32px;
    color: var(--ink-2);
  }
  .brand-mark {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-serif);
    font-size: 22px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .brand-mark .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); display: inline-block;
  }
  .topnav {
    display: flex; align-items: center; gap: 28px;
    font-size: 13px; font-weight: 500; color: var(--ink-2);
  }
  .topnav a {
    color: inherit; text-decoration: none;
    transition: color .15s var(--ease);
  }
  .topnav a:hover { color: var(--ink); }
  .topnav .pill {
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 14px;
    background: rgba(255,255,255,.5);
  }
  .topnav .pill:hover { background: #fff; }

  .stage {
    position: relative; z-index: 1;
    min-height: calc(100vh - 80px);
    display: flex; flex-direction: column;
    align-items: center;
    padding: 4vh 24px 60px;
  }

  .hero {
    text-align: center;
    margin-top: 6vh;
    margin-bottom: 38px;
    max-width: 720px;
  }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 22px;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .eyebrow::before, .eyebrow::after {
    content: "";
    width: 28px; height: 1px;
    background: var(--ink-4);
  }
  .wordmark {
    font-family: var(--font-serif);
    font-weight: 400;
    font-style: italic;
    font-size: clamp(64px, 11vw, 112px);
    line-height: 0.95;
    letter-spacing: -0.02em;
    margin: 0;
    color: var(--ink);
  }
  .wordmark .tail {
    display: inline-block;
    transform: translateY(-0.06em);
    color: var(--accent);
  }
  .tagline {
    font-size: 18px;
    line-height: 1.5;
    color: var(--ink-2);
    margin-top: 18px;
    max-width: 560px;
    margin-left: auto; margin-right: auto;
    text-wrap: balance;
  }
  .tagline em {
    font-style: italic;
    font-family: var(--font-serif);
    font-size: 1.12em;
    color: var(--ink);
  }

  /* Profile chips row */
  .chips {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 8px;
    width: 100%;
    max-width: 720px;
    margin: 0 auto 14px;
    padding: 0 8px;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 16px;
    background: rgba(255,255,255,0.55);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink-2);
    cursor: pointer;
    transition: all .18s var(--ease);
    user-select: none;
    backdrop-filter: blur(6px);
  }
  .chip:hover {
    background: #fff;
    border-color: var(--ink-4);
    color: var(--ink);
    transform: translateY(-1px);
  }
  .chip.active {
    background: var(--ink);
    color: #f7f4ec;
    border-color: var(--ink);
    box-shadow: 0 6px 18px -10px rgba(0,0,0,.5);
  }
  .chip .glyph {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 15px;
    opacity: 0.85;
    margin-right: -2px;
  }
  .chip.active .glyph { opacity: 1; }
  .chip-add {
    width: 36px; height: 36px;
    padding: 0;
    border-radius: 999px;
    border: 1px dashed var(--ink-4);
    background: transparent;
    color: var(--ink-3);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 400;
    line-height: 1;
  }
  .chip-add:hover {
    border-style: solid;
    border-color: var(--ink-2);
    color: var(--ink);
    background: #fff;
  }
  .chip-input {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 10px 7px 14px;
    background: #fff;
    border: 1px solid var(--ink-2);
    border-radius: 999px;
    font-size: 13.5px;
  }
  .chip-input input {
    border: none; outline: none; background: transparent;
    width: 110px; font: inherit; color: var(--ink);
  }
  .chip-input button {
    border: none; background: var(--accent); color: #fff;
    width: 22px; height: 22px; border-radius: 50%;
    cursor: pointer; line-height: 1; padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
  }

  /* Input dialog */
  .dialog-wrap {
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    position: relative;
  }
  .dialog {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-card);
    padding: 22px 22px 14px;
    transition: box-shadow .25s var(--ease), border-color .2s var(--ease);
  }
  .dialog:focus-within {
    border-color: var(--ink-3);
    box-shadow: 0 1px 0 rgba(26,24,20,0.04), 0 24px 50px -22px rgba(26,24,20,0.22), 0 8px 18px -10px rgba(26,24,20,0.10);
  }

  .ta-row { position: relative; }
  textarea.ta {
    width: 100%;
    min-height: 92px;
    max-height: 240px;
    border: none; outline: none;
    resize: none;
    font: inherit;
    font-size: 16px;
    line-height: 1.55;
    color: var(--ink);
    background: transparent;
    padding: 4px 4px 6px;
  }
  textarea.ta::placeholder { color: var(--ink-4); }

  .dialog-actions {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 10px;
    margin-top: 6px;
    border-top: 1px solid var(--line-2);
  }
  .dialog-meta {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.04em;
  }
  .dialog-meta .kbd {
    padding: 2px 6px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #faf8f2;
    color: var(--ink-2);
    font-family: var(--font-mono);
    font-size: 10.5px;
  }
  .dialog-buttons {
    display: flex; align-items: center; gap: 8px;
  }

  .iconbtn {
    width: 38px; height: 38px;
    display: inline-flex; align-items: center; justify-content: center;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--ink-2);
    cursor: pointer;
    transition: all .15s var(--ease);
    position: relative;
  }
  .iconbtn:hover {
    border-color: var(--ink-3);
    color: var(--ink);
    background: #fefdfa;
  }
  .iconbtn:active { transform: translateY(1px); }
  .iconbtn svg { width: 17px; height: 17px; }
  .iconbtn .lbl {
    position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #f7f4ec;
    font-size: 11px; padding: 4px 8px; border-radius: 6px;
    white-space: nowrap; opacity: 0; pointer-events: none;
    transition: opacity .15s var(--ease);
    font-family: var(--font-mono); letter-spacing: 0.04em;
  }
  .iconbtn:hover .lbl { opacity: 1; }

  .iconbtn.recording {
    background: var(--hot);
    border-color: var(--hot);
    color: #fff;
  }
  .iconbtn.recording::after {
    content: ""; position: absolute; inset: -4px;
    border-radius: 14px; border: 2px solid var(--hot);
    animation: pulse 1.2s var(--ease) infinite;
  }
  @keyframes pulse {
    0% { transform: scale(0.92); opacity: 0.8; }
    100% { transform: scale(1.18); opacity: 0; }
  }

  .submitbtn {
    height: 38px;
    padding: 0 16px 0 18px;
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--ink);
    color: #f7f4ec;
    border: 1px solid var(--ink);
    border-radius: 999px;
    font: inherit; font-size: 13.5px; font-weight: 500;
    cursor: pointer;
    transition: all .15s var(--ease);
    margin-left: 4px;
  }
  .submitbtn:hover { background: #000; }
  .submitbtn:disabled {
    background: var(--line);
    border-color: var(--line);
    color: var(--ink-3);
    cursor: not-allowed;
  }
  .submitbtn svg {
    width: 14px; height: 14px;
    transition: transform .2s var(--ease);
  }
  .submitbtn:hover:not(:disabled) svg { transform: translateX(2px); }

  /* Files row */
  .files {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin: 10px 6px 0;
    min-height: 0;
  }
  .file {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 5px 6px 5px 10px;
    background: rgba(255,255,255,0.6);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 11.5px;
    color: var(--ink-2);
    font-family: var(--font-mono);
  }
  .file .ico {
    width: 16px; height: 16px; border-radius: 4px;
    background: var(--accent-soft);
    color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 600; font-family: var(--font-sans);
  }
  .file .name { color: var(--ink); font-weight: 500; }
  .file .size { color: var(--ink-3); }
  .file .x {
    width: 16px; height: 16px; border-radius: 50%;
    border: none; background: transparent;
    color: var(--ink-3); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; padding: 0;
  }
  .file .x:hover { background: var(--line); color: var(--ink); }

  /* Recording bar overlay */
  .rec-overlay {
    position: absolute; inset: 0;
    border-radius: var(--radius);
    background: linear-gradient(135deg, #fff8f5, #fff);
    border: 1px solid var(--hot);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 22px;
    gap: 14px;
    box-shadow: var(--shadow-card);
    z-index: 2;
  }
  .rec-row { display: flex; align-items: center; gap: 12px; }
  .rec-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--hot); animation: blink 1s var(--ease) infinite;
  }
  @keyframes blink { 50% { opacity: 0.3; } }
  .rec-label { font-size: 14px; color: var(--ink); font-weight: 500; }
  .rec-time { font-family: var(--font-mono); font-size: 13px; color: var(--ink-2); }
  .rec-bars { display: flex; align-items: center; gap: 3px; height: 36px; }
  .rec-bars span {
    display: inline-block; width: 3px; border-radius: 2px;
    background: var(--hot);
    animation: wave 0.9s var(--ease) infinite;
  }
  @keyframes wave {
    0%,100% { height: 6px; }
    50% { height: 32px; }
  }
  .rec-stop {
    margin-top: 4px;
    padding: 8px 18px;
    background: var(--ink); color: #f7f4ec;
    border: none; border-radius: 999px;
    font: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer;
  }
  .rec-stop:hover { background: #000; }

  /* Footer */
  .foot {
    margin-top: 64px;
    text-align: center;
    color: var(--ink-3);
    font-size: 13.5px;
    line-height: 1.7;
    max-width: 540px;
    text-wrap: pretty;
  }
  .foot strong { color: var(--ink-2); font-weight: 500; }
  .foot .divider {
    width: 32px; height: 1px; background: var(--ink-4);
    margin: 0 auto 18px;
  }

  /* Decorative corners */
  .corner {
    position: fixed;
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.12em;
    color: var(--ink-3);
    text-transform: uppercase;
    z-index: 4;
  }
  .corner.bl { bottom: 22px; left: 32px; }
  .corner.br { bottom: 22px; right: 32px; }

  @media (max-width: 640px) {
    .topbar { padding: 16px 18px; }
    .topnav { gap: 14px; }
    .topnav .desktop-only { display: none; }
    .corner { display: none; }
    .stage { padding: 0 16px 60px; }
    .hero { margin-top: 4vh; }
    .dialog { padding: 18px 16px 12px; }
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand-mark"><span class="dot"></span> Ken</div>
    <nav class="topnav">
      <a href="#" class="desktop-only">How it works</a>
      <a href="#" class="desktop-only">Domains</a>
      <a href="#" class="pill">Sign in</a>
    </nav>
  </header>

  <main class="stage" id="root"></main>

  <span class="corner bl">v0.1 · co-listener</span>
  <span class="corner br">est. 2026</span>

</body>
</html>

  <script>
  let activeCat = 'legal';
  let attachedFiles = [];
  let isRecording = false;
  let mediaRecorder = null;
  let recordingTimer = null;
  let recordingSeconds = 0;

  const placeholders = {
    legal: "Tell me about the case. Counterparty, the contract you're reviewing, what's at stake…",
    medical: "Describe the appointment. The condition, current meds, what your doctor mentioned last time…",
    immigration: "Your visa status, priority date, employer situation, what you're trying to figure out…",
    career: "The role, the company, what you're negotiating, what you wish you'd asked last round…"
  };

  function fmtSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(0) + ' KB';
    return (bytes/(1024*1024)).toFixed(1) + ' MB';
  }
  function fmtTime(s) {
    const m = Math.floor(s/60), r = Math.floor(s%60);
    return m + ':' + r.toString().padStart(2,'0');
  }
  function getExt(name) {
    const m = name.match(/\.([^.]+)$/);
    return m ? m[1].slice(0,3).toUpperCase() : 'DOC';
  }

  function renderFiles() {
    const container = document.getElementById('files-list');
    if (!container) return;
    if (attachedFiles.length === 0) { container.innerHTML = ''; return; }
    container.innerHTML = attachedFiles.map((f, i) => `
      <span class="file">
        <span class="ico">${f.ext}</span>
        <span class="name">${f.name}</span>
        <span class="size">${fmtSize(f.size)}</span>
        <button class="x" data-idx="${i}" aria-label="Remove">&times;</button>
      </span>
    `).join('');
    container.querySelectorAll('.x').forEach(btn => {
      btn.addEventListener('click', () => {
        attachedFiles.splice(parseInt(btn.dataset.idx), 1);
        renderFiles();
      });
    });
  }

  function showRecordingOverlay() {
    const dialog = document.querySelector('.dialog');
    if (!dialog) return;
    const bars = Array.from({length: 28}, (_, i) =>
      `<span style="animation-delay:${(i % 7) * 0.08}s"></span>`
    ).join('');
    const overlay = document.createElement('div');
    overlay.className = 'rec-overlay';
    overlay.id = 'rec-overlay';
    overlay.innerHTML = `
      <div class="rec-row">
        <span class="rec-dot"></span>
        <span class="rec-label">Listening</span>
        <span class="rec-time" id="rec-time">0:00</span>
      </div>
      <div class="rec-bars">${bars}</div>
      <button class="rec-stop" id="rec-stop">Stop &amp; transcribe</button>
    `;
    dialog.style.position = 'relative';
    dialog.appendChild(overlay);

    document.getElementById('rec-stop').addEventListener('click', stopRecording);

    recordingSeconds = 0;
    recordingTimer = setInterval(() => {
      recordingSeconds += 0.1;
      const el = document.getElementById('rec-time');
      if (el) el.textContent = fmtTime(recordingSeconds);
    }, 100);
  }

  function hideRecordingOverlay() {
    const overlay = document.getElementById('rec-overlay');
    if (overlay) overlay.remove();
    if (recordingTimer) { clearInterval(recordingTimer); recordingTimer = null; }
    const voiceBtn = document.getElementById('voice-btn');
    if (voiceBtn) voiceBtn.classList.remove('recording');
  }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      const chunks = [];
      mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(chunks, { type: 'audio/webm' });
        hideRecordingOverlay();
        isRecording = false;

        // Send to server for transcription
        const formData = new FormData();
        formData.append('audio', blob, 'recording.webm');
        const ta = document.getElementById('profile-input');
        try {
          ta.placeholder = 'Transcribing...';
          const resp = await fetch('/transcribe', { method: 'POST', body: formData });
          const data = await resp.json();
          if (data.text) {
            ta.value = ta.value ? ta.value + ' ' + data.text : data.text;
          }
        } catch(err) {
          console.error('Transcription failed:', err);
        }
        ta.placeholder = placeholders[activeCat];
      };
      mediaRecorder.start();
      isRecording = true;
      document.getElementById('voice-btn').classList.add('recording');
      showRecordingOverlay();
    } catch(err) {
      alert('Microphone access denied.');
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    const root = document.getElementById('root');
    root.innerHTML = `
      <div class="hero">
        <div class="eyebrow">A co-listener for the conversations that matter</div>
        <h1 class="wordmark">Ken<span class="tail">.</span></h1>
        <p class="tagline">Tell us a little about your situation.<br/>We'll listen along and surface what <em>actually</em> matters &mdash; in real time.</p>
      </div>

      <div class="chips">
        <button class="chip active" data-cat="legal"><span class="glyph">&sect;</span>Legal</button>
        <button class="chip" data-cat="medical"><span class="glyph">&#8478;</span>Medical</button>
        <button class="chip" data-cat="immigration"><span class="glyph">&#10022;</span>Immigration</button>
        <button class="chip" data-cat="career"><span class="glyph">&para;</span>Career</button>
        <button class="chip chip-add" id="chip-add-btn">+</button>
      </div>

      <div class="dialog-wrap">
        <div class="dialog">
          <div class="ta-row">
            <textarea class="ta" id="profile-input" placeholder="${placeholders.legal}" rows="3"></textarea>
          </div>
          <div class="dialog-actions">
            <div class="dialog-meta">
              <span class="kbd">⌘</span><span class="kbd">↵</span><span>to begin</span>
            </div>
            <div class="dialog-buttons">
              <button class="iconbtn" id="voice-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v3"/></svg>
                <span class="lbl">Voice</span>
              </button>
              <button class="iconbtn" id="file-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5 12.5 20a5.5 5.5 0 0 1-7.78-7.78L13 4a3.7 3.7 0 0 1 5.24 5.24L9.7 17.78a1.85 1.85 0 0 1-2.62-2.62l7.42-7.42"/></svg>
                <span class="lbl">Attach</span>
              </button>
              <input type="file" id="file-input" multiple style="display:none" />
              <button class="submitbtn" id="submit-btn">Begin <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg></button>
            </div>
          </div>
        </div>
        <div class="files" id="files-list"></div>
      </div>

      <div class="foot">
        <div class="divider"></div>
        Ken doesn't summarize. We <strong>show you where to look</strong> &mdash;
        the jargon worth questioning, the moments that affect you, the things
        you should write down.
      </div>
    `;

    // Auto-grow textarea
    const ta = document.getElementById('profile-input');
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(240, ta.scrollHeight) + 'px';
    });

    // Chips
    document.querySelectorAll('.chip:not(.chip-add)').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCat = btn.dataset.cat;
        document.getElementById('profile-input').placeholder = placeholders[activeCat];
      });
    });

    // Voice recording
    document.getElementById('voice-btn').addEventListener('click', () => {
      if (isRecording) { stopRecording(); }
      else { startRecording(); }
    });

    // File attach
    const fileInput = document.getElementById('file-input');
    document.getElementById('file-btn').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      const newFiles = Array.from(e.target.files).map(f => ({
        name: f.name, size: f.size, ext: getExt(f.name), file: f
      }));
      attachedFiles = [...attachedFiles, ...newFiles];
      renderFiles();
      e.target.value = '';
    });

    // Submit — call LLM to summarize before navigating
    document.getElementById('submit-btn').addEventListener('click', async () => {
      const text = document.getElementById('profile-input').value;
      if (!text.trim() && attachedFiles.length === 0) return;

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = 'Preparing…';

      sessionStorage.setItem('profileCat', activeCat);
      sessionStorage.setItem('profileText', text);

      try {
        const resp = await fetch('/summarize', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ text, category: activeCat })
        });
        const data = await resp.json();
        if (data.summary) sessionStorage.setItem('profileSummary', data.summary);
        if (data.keywords) sessionStorage.setItem('profileKeywords', JSON.stringify(data.keywords));
      } catch(e) {
        console.error('Summarize failed, using raw text', e);
      }

      window.location.href = '/session';
    });

    // Keyboard shortcut
    ta.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('submit-btn').click();
      }
    });
  });
  </script>
</body>
</html>
